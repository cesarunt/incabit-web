<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | {{ site.brand }}</title>
    <meta name="description" content="Plataforma de inteligencia visual para detectar objetos, analizar comportamientos y anticipar acciones.">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <header class="site-header">
        <div class="container nav-wrap">
            <a class="brand" href="{{ url_for('home') }}" aria-label="Ir al inicio">
                <img src="/static/img/incabit-logoV2 500x170.png" alt="IncaB1T" class="brand__logo">
            </a>
            <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">☰</button>
            <nav class="site-nav" id="siteNav">
                <a href="{{ url_for('home') }}">Inicio</a>
                <a href="{{ url_for('aprendizaje') }}">Aprendizaje</a>
                <a href="{{ url_for('plataforma') }}">Plataforma</a>
                <a href="{{ url_for('soluciones') }}">Soluciones</a>
                <!-- <a href="{{ url_for('demo') }}">Demo</a> -->
                <a href="{{ url_for('contacto') }}">Contacto</a>
                <a href="{{ url_for('emergencia') }}" class="btn btn-sm">Emergencia</a>
            </nav>
        </div>
    </header>

    {% block content %}{% endblock %}

    <footer class="site-footer">
        <div class="container footer-grid">
            <div>
                <h3>{{ site.brand }}</h3>
                <p>© 2026 incaB1T, todos los derechos reservados.</p>
            </div>
            <div>
                <h4>Enlaces</h4>
                <ul>
                    <li><a href="{{ url_for('aprendizaje') }}">Aprendizaje</a></li>
                    <li><a href="{{ url_for('plataforma') }}">Plataforma</a></li>
                    <li><a href="{{ url_for('soluciones') }}">Soluciones</a></li>
                </ul>
            </div>
            <div>
                <h4>Contacto</h4>
                <ul>
                    <li><i class="fa fa-phone"></i>&nbsp;&nbsp;&nbsp; {{ site.phone }}</li>
                    <li><i class="fa fa-envelope"></i>&nbsp;&nbsp;&nbsp; {{ site.email }}</li>
                    <li><i class="peru-red"></i><i class="peru-white"></i><i class="peru-red"></i>&nbsp; Lima - Perú</li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
